<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProjectOS</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: #0F1117; color: #E8EAF0; }
      #root { min-height: 100vh; }
      input, select, button, textarea { font-family: inherit; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #171B26; }
      ::-webkit-scrollbar-thumb { background: #2A2F42; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #4A5068; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

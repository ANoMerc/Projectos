version: '3.9'

services:
  # ── PostgreSQL 16 + pgvector ─────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: projectos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: projectos
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: projectos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible local storage) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: projectos_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console → http://localhost:9001
    volumes:
      - minio-data:/data

  # ── MailDev (local SMTP + email preview) ─────────────────────────────────
  maildev:
    image: maildev/maildev:latest
    container_name: projectos_maildev
    restart: unless-stopped
    ports:
      - "1080:1080"   # Web UI → http://localhost:1080
      - "1025:1025"   # SMTP

volumes:
  postgres-data:
  redis-data:
  minio-data:
